{% extends "base.html" %}
{% block title %}{{ "编辑" if product else "新增" }}商品{% endblock %}
{% block body %}
<div class="section-title"><h2>{{ "编辑" if product else "新增" }}商品</h2></div>
<form method="post" style="max-width:520px;background:#fff;padding:24px;border-radius:10px;">
  <label>商品名称</label>
  <input type="text" name="name" required value="{{ product.name if product else '' }}">
  <label>所属分类</label>
  <select name="category_id" required>
    {% for c in categories %}
    <option value="{{ c.category_id }}" {% if product and product.category_id==c.category_id %}selected{% endif %}>{{ c.name }}</option>
    {% endfor %}
  </select>
  <label>描述</label>
  <textarea name="description" rows="2">{{ product.description if product else '' }}</textarea>
  <label>价格（¥）</label>
  <input type="number" step="0.01" name="price" required value="{{ product.price if product else '' }}">
  <label>库存</label>
  <input type="number" name="stock" value="{{ product.stock if product else 0 }}">
  {% if product %}
  <label><input type="checkbox" name="available" {% if product.available %}checked{% endif %}> 上架销售</label>
  {% endif %}
  <button type="submit" class="btn" style="margin-top:18px;">保存</button>
  <a class="btn secondary" href="{{ url_for('products.menu') }}">取消</a>
</form>
{% endblock %}
