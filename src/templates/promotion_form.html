{% extends "base.html" %}
{% block title %}新增促销码{% endblock %}
{% block body %}
<div class="section-title"><h2>新增促销码</h2></div>
<form method="post" style="max-width:520px;background:#fff;padding:24px;border-radius:10px;">
  <label>促销码 *</label>
  <input type="text" name="code" required placeholder="如：SUMMER20（自动转大写）"
         style="text-transform:uppercase;">
  <label>促销名称 *</label>
  <input type="text" name="name" required placeholder="如：夏季全场 8 折">
  <label>折扣率 *（小数表示，如 0.8 表示 8 折）</label>
  <input type="number" step="0.01" min="0.01" max="1.00" name="discount" value="0.90" required>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
    <div>
      <label>开始日期</label>
      <input type="date" name="start_date">
    </div>
    <div>
      <label>结束日期</label>
      <input type="date" name="end_date">
    </div>
  </div>
  <button class="btn" style="margin-top:18px;" type="submit">创建</button>
  <a class="btn secondary" href="{{ url_for('promotions') }}">取消</a>
</form>
{% endblock %}
