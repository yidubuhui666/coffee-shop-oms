{% extends "base.html" %}
{% block title %}新建订单{% endblock %}
{% block body %}
<div class="section-title"><h2>新建订单</h2></div>
<form method="post" id="orderForm" style="background:#fff;padding:24px;border-radius:10px;">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">
    <div>
      <label>会员（可选）</label>
      <select name="customer_id" id="customerSel" onchange="calc()">
        <option value="">散客</option>
        {% set lvl = {'BRONZE':'青铜','SILVER':'白银','GOLD':'黄金','PLATINUM':'铂金'} %}
        {% for c in customers %}
        <option value="{{ c.customer_id }}" data-level="{{ c.member_level }}"
                data-points="{{ c.points }}">
          {{ c.name }}（{{ lvl[c.member_level] }}・{{ c.points }} 积分）
        </option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label>支付方式</label>
      <select name="payment_method">
        <option value="WECHAT">微信</option>
        <option value="ALIPAY">支付宝</option>
        <option value="CARD">银行卡</option>
        <option value="CASH">现金</option>
      </select>
    </div>
  </div>
  <label><input type="checkbox" name="dine_in" checked> 堂食</label>
  <label>优惠码（可选）</label>
  <input type="text" name="promo_code" placeholder="如 SUMMER20" oninput="calc()">
  <label>备注</label>
  <input type="text" name="remark" placeholder="少糖、多冰…">

  <!-- 积分抵现：仅选择会员后可用 -->
  <div id="pointsBox" style="display:none;margin-top:10px;">
    <label>使用积分抵现
      <span style="color:#8b7569;font-weight:normal;">
        （{{ points_per_yuan }} 积分 = ¥1；当前可用 <strong id="ptsAvail">0</strong> 积分）
      </span>
    </label>
    <div style="display:flex;gap:8px;align-items:center;">
      <input type="number" name="points_use" id="pointsUse" min="0" step="{{ points_per_yuan }}"
             value="0" oninput="calc()" style="max-width:200px;">
      <button type="button" class="btn secondary small" onclick="useMaxPoints()">用满</button>
    </div>
  </div>

  <h3 style="margin-top:24px;color:#6f4e37;">商品明细</h3>
  <div class="cart-row" style="font-weight:600;color:#5b4636;">
    <span>商品</span><span>数量</span><span>杯型</span><span></span>
  </div>
  <div id="rows">
    <div class="cart-row">
      <select name="product_id[]" onchange="calc()">
        <option value="">-- 请选择 --</option>
        {% for p in products %}
        <option value="{{ p.product_id }}" data-price="{{ p.price }}">
          {{ p.name }} — ¥{{ '%.2f' % p.price }}
        </option>
        {% endfor %}
      </select>
      <input type="number" name="quantity[]" min="1" value="1" oninput="calc()">
      <select name="size[]"><option>S</option><option selected>M</option><option>L</option></select>
      <span></span>
    </div>
  </div>
  <button type="button" class="btn secondary small" onclick="addRow()">+ 增加一行</button>

  <!-- 实时合计 -->
  <div id="totalBox" class="total-box">
    <div class="total-line"><span>原价合计</span><span id="subtotal">¥0.00</span></div>
    <div class="total-line discount-line" id="discountLine" style="display:none;">
      <span id="discountLabel">会员折扣</span><span id="discountAmt">- ¥0.00</span>
    </div>
    <div class="total-line discount-line" id="redeemLine" style="display:none;">
      <span id="redeemLabel">积分抵现</span><span id="redeemAmt">- ¥0.00</span>
    </div>
    <div class="total-line final-line">
      <span>实付金额</span><span id="finalAmt">¥0.00</span>
    </div>
  </div>

  <div style="margin-top:18px;">
    <button class="btn" type="submit">提交订单</button>
    <a class="btn secondary" href="{{ url_for('orders.orders') }}">取消</a>
  </div>
</form>

<style>
.total-box {
  margin-top:18px; padding:16px 20px; background:linear-gradient(135deg,#f7eee4,#f1eae2);
  border-radius:10px; border-left:4px solid #6f4e37;
}
.total-line { display:flex; justify-content:space-between; padding:4px 0; font-size:14px; color:#5b4636; }
.total-line.discount-line { color:#b04835; }
.total-line.final-line { border-top:2px dashed #d7a86e; margin-top:6px; padding-top:10px;
                          font-size:20px; font-weight:700; color:#3e2723; }
</style>

<template id="row-tpl">
  <div class="cart-row">
    <select name="product_id[]" onchange="calc()">
      <option value="">-- 请选择 --</option>
      {% for p in products %}
      <option value="{{ p.product_id }}" data-price="{{ p.price }}">
        {{ p.name }} — ¥{{ '%.2f' % p.price }}
      </option>
      {% endfor %}
    </select>
    <input type="number" name="quantity[]" min="1" value="1" oninput="calc()">
    <select name="size[]"><option>S</option><option selected>M</option><option>L</option></select>
    <button type="button" class="btn danger small" onclick="this.parentNode.remove();calc();">×</button>
  </div>
</template>
<script>
const MD_MAP = {{ md_map|tojson }};
const LVL_ZH = {BRONZE:'青铜',SILVER:'白银',GOLD:'黄金',PLATINUM:'铂金'};
const PPY = {{ points_per_yuan }};   // 每多少积分抵 ¥1

function addRow() {
  const tpl = document.getElementById('row-tpl').content.cloneNode(true);
  document.getElementById('rows').appendChild(tpl);
  calc();
}

function curCustomerPoints() {
  const sel = document.getElementById('customerSel');
  return parseInt(sel.options[sel.selectedIndex]?.dataset.points || 0) || 0;
}

function useMaxPoints() {
  // 取「会员余额」与「折后金额可抵上限」的较小值，并向下取整到 PPY 的整数倍。
  const avail = curCustomerPoints();
  const discounted = parseFloat(document.getElementById('finalAmt').dataset.discounted || 0);
  const maxByAmt = Math.floor(discounted * PPY);
  document.getElementById('pointsUse').value = Math.max(0, Math.min(avail, maxByAmt));
  calc();
}

function calc() {
  let subtotal = 0;
  document.querySelectorAll('#rows .cart-row').forEach(row => {
    const sel = row.querySelector('select[name="product_id[]"]');
    const qty = parseInt(row.querySelector('input[name="quantity[]"]').value) || 0;
    const opt = sel.options[sel.selectedIndex];
    const price = parseFloat(opt?.dataset.price || 0);
    if (price && qty > 0) subtotal += price * qty;
  });

  // 会员折扣
  const custSel = document.getElementById('customerSel');
  const sel = custSel.options[custSel.selectedIndex];
  const level = sel?.dataset.level;
  let rate = 1.0, label = '会员折扣';
  if (level && MD_MAP[level]) {
    rate = MD_MAP[level];
    label = `会员折扣（${LVL_ZH[level]} ${Math.round(rate*100)}折）`;
  }

  const discounted = subtotal * rate;     // 折后金额
  const discount = subtotal - discounted;

  // 积分抵现框：仅选了会员才显示
  const pbox = document.getElementById('pointsBox');
  const isMember = !!custSel.value;
  pbox.style.display = isMember ? '' : 'none';
  const avail = curCustomerPoints();
  document.getElementById('ptsAvail').textContent = avail;

  // 计算抵扣
  let pts = isMember ? (parseInt(document.getElementById('pointsUse').value) || 0) : 0;
  const maxByAmt = Math.floor(discounted * PPY);
  pts = Math.max(0, Math.min(pts, avail, maxByAmt));
  if (isMember) document.getElementById('pointsUse').value = pts;
  const redeem = pts / PPY;

  const finalAmt = discounted - redeem;
  const finalEl = document.getElementById('finalAmt');
  finalEl.dataset.discounted = discounted;      // 供「用满」按钮读取
  document.getElementById('subtotal').textContent = '¥' + subtotal.toFixed(2);
  finalEl.textContent = '¥' + finalAmt.toFixed(2);

  const dl = document.getElementById('discountLine');
  if (discount > 0.001) {
    dl.style.display = '';
    document.getElementById('discountLabel').textContent = label;
    document.getElementById('discountAmt').textContent = '- ¥' + discount.toFixed(2);
  } else {
    dl.style.display = 'none';
  }

  const rl = document.getElementById('redeemLine');
  if (redeem > 0.001) {
    rl.style.display = '';
    document.getElementById('redeemLabel').textContent = `积分抵现（${pts} 积分）`;
    document.getElementById('redeemAmt').textContent = '- ¥' + redeem.toFixed(2);
  } else {
    rl.style.display = 'none';
  }
}
calc();
</script>
{% endblock %}
