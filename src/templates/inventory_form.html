{% extends "base.html" %}
{% block title %}新增原料{% endblock %}
{% block body %}
<div class="section-title"><h2>新增原料</h2></div>
<form method="post" style="max-width:480px;background:#fff;padding:24px;border-radius:10px;">
  <label>原料名称 *</label>
  <input type="text" name="name" required placeholder="如：碧螺春茶包">
  <label>单位 *</label>
  <select name="unit" required>
    <option value="kg">kg（千克）</option>
    <option value="L">L（升）</option>
    <option value="个">个</option>
    <option value="包">包</option>
    <option value="瓶">瓶</option>
  </select>
  <label>初始库存数量</label>
  <input type="number" step="0.01" name="quantity" value="0">
  <label>告警阈值（低于此值会预警）</label>
  <input type="number" step="0.01" name="alert_threshold" value="10">
  <button class="btn" style="margin-top:18px;" type="submit">添加</button>
  <a class="btn secondary" href="{{ url_for('inventory') }}">取消</a>
</form>
{% endblock %}
