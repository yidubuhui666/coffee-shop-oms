{% extends "base.html" %}
{% block title %}{{ '编辑员工' if staff else '新增员工' }}{% endblock %}
{% block body %}
<div class="section-title"><h2>{{ '编辑员工' if staff else '新增员工' }}</h2></div>
<form method="post" style="background:#fff;padding:24px;border-radius:10px;max-width:600px;">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">
    <div>
      <label>用户名 *</label>
      {% if staff %}
        <input type="text" value="{{ staff.username }}" disabled>
        <small style="color:#8b7569;">用户名不可修改</small>
      {% else %}
        <input type="text" name="username" required>
      {% endif %}
    </div>
    <div>
      <label>姓名 *</label>
      <input type="text" name="name" value="{{ staff.name if staff else '' }}" required>
    </div>
    <div>
      <label>密码 {% if staff %}（留空表示不修改）{% else %}*{% endif %}</label>
      <input type="text" name="password" {{ '' if staff else 'required' }}>
    </div>
    <div>
      <label>手机号</label>
      <input type="text" name="phone" value="{{ staff.phone or '' if staff else '' }}">
    </div>
    <div>
      <label>角色 *</label>
      <select name="role">
        {% for code, zh in [('ADMIN','管理员'),('BARISTA','咖啡师'),('CASHIER','收银员')] %}
        <option value="{{ code }}" {% if staff and staff.role==code %}selected{% endif %}>{{ zh }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
  <div style="margin-top:24px;">
    <button class="btn" type="submit">{{ '保存修改' if staff else '添加员工' }}</button>
    <a class="btn secondary" href="{{ url_for('staff_list') }}">取消</a>
  </div>
</form>
{% endblock %}
